workflows:
  careerlog-mobile-build:
    name: CareerLog Mobile Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
        - pattern: "master"
          include: true
          source: true
        - pattern: "feature/*"
          include: true
          source: true

    environment:
      node: 20
      groups:
        - expo_credentials

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Check TypeScript
        script: |
          npx tsc --noEmit

      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      - name: Build Android APK with EAS
        script: |
          eas build --platform android --profile preview --non-interactive --wait

      - name: Build iOS IPA with EAS
        script: |
          eas build --platform ios --profile preview --non-interactive --wait

    artifacts:
      - dist/**
      - build/**
      - "*.apk"
      - "*.ipa"