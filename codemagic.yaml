workflows:
  careerlog-android-build:
    name: CareerLog Android APK Build
    max_build_duration: 45
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: master
          include: true
          source: true
        - pattern: "feature/*"
          include: true
          source: true

    environment:
      node: 20
      java: 17

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Check TypeScript
        script: |
          npx tsc --noEmit

      - name: Generate Android project
        script: |
          npx expo prebuild --platform android --non-interactive

      - name: Build Android debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk


  careerlog-ios-build:
    name: CareerLog iOS AltStore IPA Build
    max_build_duration: 45
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: master
          include: true
          source: true
        - pattern: "feature/*"
          include: true
          source: true

    environment:
      node: 20
      xcode: latest
      cocoapods: default

      vars:
        XCODE_SCHEME: CareerLog
        XCODE_WORKSPACE: CareerLog.xcworkspace

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Check TypeScript
        script: |
          npx tsc --noEmit

      - name: Generate iOS project
        script: |
          npx expo prebuild --platform ios --non-interactive

      - name: Patch Podfile
        script: |
          echo "use_modular_headers!" | cat - ios/Podfile > temp && mv temp ios/Podfile

      - name: Show generated iOS files
        script: |
          echo "iOS folder contents:"
          ls -la ios

      - name: Install iOS pods
        script: |
          cd ios
          pod install

      - name: Build unsigned iOS app
        script: |
          xcodebuild \
            -workspace "$CM_BUILD_DIR/ios/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned iOS app as AltStore IPA
        script: |
          mkdir -p build/ios/ipa/Payload

          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug-iphoneos/*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app file found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          cp -R "$APP_PATH" build/ios/ipa/Payload/CareerLog.app

          cd build/ios/ipa

          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload CareerLog-AltStore-unsigned.ipa

          echo "IPA file created:"
          ls -lh CareerLog-AltStore-unsigned.ipa

          echo "IPA contents:"
          unzip -l CareerLog-AltStore-unsigned.ipa | head -50

    artifacts:
      - build/ios/ipa/*.ipa


  careerlog-mobile-build:
    name: CareerLog Android + iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: master
          include: true
          source: true
        - pattern: "feature/*"
          include: true
          source: true

    environment:
      node: 20
      java: 17
      xcode: latest
      cocoapods: default

      vars:
        XCODE_SCHEME: CareerLog
        XCODE_WORKSPACE: CareerLog.xcworkspace

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Check TypeScript
        script: |
          npx tsc --noEmit

      - name: Generate native projects
        script: |
          npx expo prebuild --platform all --non-interactive

      - name: Show generated iOS files
        script: |
          echo "iOS folder contents:"
          ls -la ios

      - name: Install iOS pods
        script: |
          cd ios
          pod install

      - name: Build Android debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build unsigned iOS app
        script: |
          xcodebuild \
            -workspace "$CM_BUILD_DIR/ios/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned iOS app as AltStore IPA
        script: |
          mkdir -p build/ios/ipa/Payload

          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Debug-iphoneos/*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app file found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          cp -R "$APP_PATH" build/ios/ipa/Payload/CareerLog.app

          cd build/ios/ipa

          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload CareerLog-AltStore-unsigned.ipa

          echo "IPA file created:"
          ls -lh CareerLog-AltStore-unsigned.ipa

          echo "IPA contents:"
          unzip -l CareerLog-AltStore-unsigned.ipa | head -50

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
      - build/ios/ipa/*.ipa